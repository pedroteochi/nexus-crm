<!--
  Nexus CRM — template de "Redefinir senha".
  Cole em: Supabase → Authentication → Emails → Templates → "Reset password".
  Assunto sugerido: Redefinir sua senha do Nexus CRM
  Variável do Supabase: {{ .ConfirmationURL }}
-->
<table width="100%" cellpadding="0" cellspacing="0" style="background:#f5f5f9;padding:32px 0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <tr>
    <td align="center">
      <table width="440" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:14px;border:1px solid #e2e2ec;overflow:hidden;">
        <tr>
          <td style="background:#6366f1;padding:20px 28px;">
            <span style="color:#ffffff;font-size:18px;font-weight:700;letter-spacing:-0.01em;">Nexus CRM</span>
          </td>
        </tr>
        <tr>
          <td style="padding:32px 28px 8px;">
            <h1 style="margin:0 0 12px;font-size:22px;color:#191a2b;">Redefinir senha</h1>
            <p style="margin:0 0 24px;font-size:15px;line-height:1.6;color:#494b63;">
              Recebemos um pedido para redefinir a senha da sua conta. Clique abaixo para criar uma nova.
            </p>
            <a href="{{ .ConfirmationURL }}"
               style="display:inline-block;background:#6366f1;color:#ffffff;text-decoration:none;
                      font-size:15px;font-weight:600;padding:13px 26px;border-radius:10px;">
              Redefinir minha senha
            </a>
            <p style="margin:24px 0 0;font-size:13px;line-height:1.6;color:#767892;">
              Se você não pediu isso, ignore este e-mail — sua senha continua a mesma.
            </p>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>
